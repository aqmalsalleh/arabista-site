<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Arabista — Order Successful (STAGING)</title>
  <meta name="theme-color" content="#0F0F10" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        theme: { 
            extend: { 
                fontFamily: { display: ['"Cormorant Garamond"', 'serif'], sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
                colors: { brand: '#0F0F10', luxe: '#C0A062' }
            }
        }
    }
  </script>
</head>
<body class="bg-brand text-gray-300 font-sans antialiased min-h-screen flex flex-col items-center justify-center selection:bg-gray-700 selection:text-white">

    <div class="max-w-md w-full px-6 text-center">
        <div class="relative flex items-center justify-center mb-8 mt-2">
            <div class="absolute inset-0 bg-luxe/20 rounded-full blur-xl animate-pulse"></div>
            <div class="relative w-20 h-20 rounded-full border border-luxe/30 flex items-center justify-center bg-brand shadow-[0_0_20px_rgba(192,160,98,0.15)] z-10">
                <svg class="w-8 h-8 text-luxe drop-shadow-[0_0_8px_rgba(192,160,98,0.5)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <div class="absolute w-28 h-28 rounded-full border border-transparent border-t-luxe/40 border-r-luxe/10 animate-[spin_4s_linear_infinite] z-0"></div>
        </div>

        <h1 class="text-3xl font-display text-luxe text-center tracking-[0.05em]">Order Successful</h1>
        
        <div class="bg-gray-900/40 p-6 rounded-xl border border-gray-800/80 mb-8">
            <p class="text-sm text-gray-400 mb-2 uppercase tracking-widest text-[10px]">Order Reference</p>
            <p id="display-order-id" class="text-lg font-medium text-white tracking-widest">ORD-VERIFYING...</p>
        </div>

        <p class="mt-5 text-sm text-gray-400 text-center leading-relaxed px-2">
            Your item has officially entered our tailoring queue. To receive your live tracking link and dispatch notification, please activate your order updates below.
        </p>

        <button onclick="document.getElementById('wa-link').click()" class="mt-8 w-full py-4 rounded-xl border border-luxe/30 bg-luxe/10 text-luxe text-[13px] font-medium uppercase tracking-widest hover:bg-luxe hover:text-brand hover:border-luxe hover:shadow-[0_0_20px_rgba(192,160,98,0.3)] transition-all duration-300 flex items-center justify-center gap-3 tap-none group">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            Activate Order Updates
        </button>

        <p class="mt-8 text-[10px] text-gray-600 uppercase tracking-widest text-center">
            &copy; 2026 Arabista Enterprise
        </p>
    </div>

    <a id="wa-link" href="#" target="_blank" rel="noopener noreferrer" class="sr-only" tabindex="-1" aria-hidden="true">WhatsApp</a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id') || 'YOUR RECENT ORDER';
            
            const displayEl = document.getElementById('display-order-id');
            if (urlParams.get('order_id')) {
                displayEl.textContent = orderId;
            } else {
                displayEl.textContent = "VERIFIED";
            }

            const message = `Hello Arabista! I just purchased my order (${orderId}). Please activate my shipping updates.`;
            const whatsappUrl = `https://wa.me/60174920942?text=${encodeURIComponent(message)}`;
            const waLink = document.getElementById('wa-link');
            waLink.href = whatsappUrl;
        });
    </script>
</body>
</html>
