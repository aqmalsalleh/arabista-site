<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arabista — Alteration Tracker</title>
  <meta name="theme-color" content="#0F0F10" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { display: ['"Cormorant Garamond"', 'serif'], sans: ['Inter', 'ui-sans-serif', 'system-ui'], }, colors: { brand: { DEFAULT: '#0F0F10' }, luxe: { DEFAULT: '#C0A062' }, } } },
    }
  </script>
  <style>
    body { background-color: #0F0F10; color: white; }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    input[type="text"] { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; padding: 12px 16px; width: 100%; transition: all 0.2s; }
    input[type="text"]:focus { outline: none; border-color: #C0A062; background: rgba(192,160,98,0.05); }
    .timeline-dot { width: 12px; height: 12px; border-radius: 50%; background: #333; z-index: 10; position: relative; }
    .timeline-dot.active { background: #C0A062; box-shadow: 0 0 10px rgba(192,160,98,0.5); }
    .timeline-dot.completed { background: #4ade80; }
    .timeline-line { position: absolute; left: 5px; top: 12px; bottom: -24px; width: 2px; background: #333; z-index: 0; }
    .timeline-line.active { background: #4ade80; }
    .last-step .timeline-line { display: none; }
  </style>
</head>
<body class="antialiased selection:bg-luxe selection:text-brand">

  <header class="fixed top-0 inset-x-0 z-50 backdrop-blur bg-brand/80 border-b border-white/10">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6">
      <div class="h-14 grid grid-cols-3 items-center">
        <div class="col-span-1 flex items-center">
          <a href="index.html" class="font-display tracking-[0.18em] text-[14px] leading-none hover:text-luxe transition">ARABISTA</a>
        </div>
        <div class="col-span-1 flex items-center justify-center">
           <a href="index.html"><img src="images/logo-88.webp" alt="Arabista logo" class="h-11 w-auto" width="88" height="88"></a>
        </div>
        <div class="col-span-1 flex items-center justify-end gap-3 text-sm">
           <a href="index.html" class="hover:text-luxe transition text-white/50">Back to Home</a>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-24 pb-20 max-w-screen-sm mx-auto px-4 sm:px-6 min-h-screen flex flex-col">
    
    <div id="search-panel" class="hidden text-center mt-10 fade-in">
        <h1 class="font-display text-3xl mb-3">Track Alteration</h1>
        <p class="text-white/50 text-sm mb-8">Enter your unique tracking ID below.</p>
        <div class="bg-white/5 border border-white/10 p-6 rounded-xl text-left">
            <label class="block text-xs text-white/70 mb-2 uppercase tracking-widest">Alteration ID</label>
            <input type="text" id="search-input" placeholder="e.g. ALT-0226-ABCD">
            <button onclick="searchTracker()" class="w-full mt-4 bg-luxe text-brand font-bold py-3 rounded-xl hover:bg-white transition">Track Order</button>
        </div>
    </div>

    <div id="loading-panel" class="hidden text-center mt-20 flex-1 flex flex-col items-center justify-center fade-in">
        <svg class="animate-spin h-8 w-8 text-luxe mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p class="text-white/50">Locating your order details...</p>
    </div>

    <div id="tracker-panel" class="hidden fade-in">
        <div class="flex justify-between items-end mb-6">
            <div>
                <p class="text-xs text-luxe uppercase tracking-widest mb-1">Order ID</p>
                <h1 class="font-mono text-2xl font-bold" id="display-id">...</h1>
            </div>
            <button onclick="shareLink()" class="flex items-center gap-2 text-xs font-medium bg-white/10 hover:bg-white/20 border border-white/10 px-3 py-1.5 rounded transition">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                Share Link
            </button>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-xl p-5 mb-8">
            <p class="text-sm font-medium mb-1" id="display-name">...</p>
            <p class="text-xs text-white/50 mb-3" id="display-hub">Assigned to: ...</p>
            <div class="border-t border-white/10 pt-3">
                <p class="text-xs text-white/40 mb-1">Items for Alteration:</p>
                <p class="text-sm text-white/80 whitespace-pre-line" id="display-items">...</p>
            </div>
        </div>

        <h2 class="font-display text-xl mb-4">Tracking Status</h2>
        
        <div class="space-y-6 relative ml-2" id="timeline-container">
            </div>

        <div id="action-box" class="hidden mt-8 p-5 bg-luxe/10 border border-luxe/30 rounded-xl text-center fade-in">
            <h3 class="text-luxe font-bold mb-2 text-lg font-display">Your Items are Ready!</h3>
            <p class="text-sm text-white/80 mb-5" id="action-instruction">How would you like to receive your completed order?</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setReturnChoice('Self-Pickup')" class="px-4 py-3 rounded-xl border border-luxe text-luxe text-sm font-bold hover:bg-luxe/20 transition">I will Self-Pickup</button>
                <button onclick="setReturnChoice('Lalamove')" class="px-4 py-3 rounded-xl bg-luxe text-brand text-sm font-bold hover:bg-white transition shadow-soft">Send via Lalamove</button>
            </div>
        </div>

        <div id="resolved-box" class="hidden mt-8 p-4 bg-green-500/10 border border-green-500/20 rounded-xl flex items-start gap-3 fade-in">
            <svg class="w-5 h-5 text-green-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <div>
                <p class="text-sm font-bold text-green-400 mb-1" id="resolved-title">Selection Confirmed</p>
                <p class="text-xs text-green-200" id="resolved-desc">...</p>
            </div>
        </div>

    </div>
  </main>

  <script>
    // --- APP SCRIPT URL ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyrJFfuCrhAbdwzAj8uP4sSvFuzRzzzEFV5CHOCBSOK6OGlIXPtsf7-XEfjLHGnFZiyvw/exec'; // IMPORTANT: Use your deployed URL!
    
    let currentData = null;

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const trackId = urlParams.get('id');
        
        if (trackId) {
            document.getElementById('loading-panel').classList.remove('hidden');
            fetchTrackingData(trackId);
        } else {
            document.getElementById('search-panel').classList.remove('hidden');
        }
    });

    function searchTracker() {
        const val = document.getElementById('search-input').value.trim().toUpperCase();
        if(!val) return alert("Please enter an Alteration ID.");
        window.location.href = `alteration-tracker.html?id=${val}`;
    }

    async function fetchTrackingData(id) {
        try {
            const res = await fetch(`${scriptURL}?track_id=${id}`);
            const data = await res.json();
            
            document.getElementById('loading-panel').classList.add('hidden');

            if (data.error) {
                alert("Order not found. Please check your ID and try again.");
                document.getElementById('search-panel').classList.remove('hidden');
                return;
            }

            currentData = data.trackData;
            renderDashboard();

        } catch (error) {
            alert("Connection error. Please try again.");
            document.getElementById('search-panel').classList.remove('hidden');
        }
    }

    function renderDashboard() {
        document.getElementById('search-panel').classList.add('hidden');
        document.getElementById('tracker-panel').classList.remove('hidden');
        
        document.getElementById('display-id').innerText = currentData.alterationId;
        document.getElementById('display-name').innerText = currentData.customerName;
        document.getElementById('display-hub').innerText = `Assigned to: ${currentData.hubName}`;
        document.getElementById('display-items').innerText = currentData.itemDetails.replace(/\[/g, '').replace(/\]/g, '');

        buildTimeline(currentData.orderStatus);
        handleActionBox();
    }

    function buildTimeline(status) {
        const stages = ["Pending Dropoff", "In Progress", "Ready for Return", "Dispatched / Picked Up"];
        let currentIdx = stages.indexOf(status);
        if (currentIdx === -1) currentIdx = 0; // fallback

        let html = '';
        stages.forEach((stage, idx) => {
            let isPast = idx < currentIdx;
            let isCurrent = idx === currentIdx;
            
            let dotClass = isPast ? "completed" : (isCurrent ? "active" : "");
            let lineClass = isPast ? "active" : "";
            
            let extraText = "";
            if (stage === "Dispatched / Picked Up" && isCurrent) {
                if (currentData.outboundChoice === "Lalamove" && currentData.trackingUrl) {
                    extraText = `<a href="${currentData.trackingUrl}" target="_blank" class="mt-2 inline-block text-xs font-bold text-brand bg-luxe px-3 py-1.5 rounded hover:bg-white transition">Live Lalamove Map &rarr;</a>`;
                } else if (currentData.outboundChoice === "Self-Pickup") {
                    extraText = `<p class="mt-1 text-xs text-white/50">Item has been collected.</p>`;
                }
            }

            html += `
            <div class="relative pl-6 pb-8 ${idx === stages.length - 1 ? 'last-step' : ''}">
                <div class="timeline-line ${lineClass}"></div>
                <div class="absolute left-0 top-1 timeline-dot ${dotClass}"></div>
                <h4 class="text-sm font-bold ${isPast || isCurrent ? 'text-white' : 'text-white/30'}">${stage}</h4>
                ${extraText}
            </div>`;
        });

        document.getElementById('timeline-container').innerHTML = html;
    }

    function handleActionBox() {
        const actionBox = document.getElementById('action-box');
        const resolvedBox = document.getElementById('resolved-box');
        
        if (currentData.orderStatus === "Ready for Return") {
            if (!currentData.outboundChoice || currentData.outboundChoice === "") {
                actionBox.classList.remove('hidden');
                resolvedBox.classList.add('hidden');
                
                let inst = document.getElementById('action-instruction');
                if (currentData.returnEligibility === "Free Return") {
                    inst.innerHTML = "You are eligible for <strong>Free Return Delivery</strong>! Please select your preference.";
                } else {
                    inst.innerHTML = "You may self-pickup or arrange a Lalamove (Rider will collect delivery fee from you).";
                }
            } else {
                actionBox.classList.add('hidden');
                resolvedBox.classList.remove('hidden');
                
                document.getElementById('resolved-desc').innerText = currentData.outboundChoice === 'Lalamove' 
                    ? "You selected Lalamove. The Hub will dispatch your item shortly."
                    : "You selected Self-Pickup. The Hub is awaiting your arrival.";
            }
        } else {
            actionBox.classList.add('hidden');
            resolvedBox.classList.add('hidden');
        }
    }

    async function setReturnChoice(choice) {
        // Optimistic UI update
        document.getElementById('action-box').classList.add('opacity-50', 'pointer-events-none');
        
        const payload = {
            action: "update_outbound",
            alteration_id: currentData.alterationId,
            outbound_choice: choice
        };

        try {
            const res = await fetch(scriptURL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            const responseData = await res.json();
            
            if(responseData.status === "success") {
                currentData.outboundChoice = choice;
                document.getElementById('action-box').classList.remove('opacity-50', 'pointer-events-none');
                handleActionBox();
            } else {
                throw new Error("Update failed");
            }
        } catch (error) {
            alert("Network error. Please try again.");
            document.getElementById('action-box').classList.remove('opacity-50', 'pointer-events-none');
        }
    }

    function shareLink() {
        if (navigator.share) {
            navigator.share({
                title: 'Arabista Alteration Tracker',
                text: `Track my Abaya alteration order (${currentData.alterationId}):`,
                url: window.location.href
            }).catch((error) => console.log('Error sharing', error));
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Tracking link copied to clipboard!");
        }
    }
  </script>
</body>
</html>
