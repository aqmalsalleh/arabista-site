            <span id="nav-cart-badge" class="absolute top-0 right-0 -mt-0.5 -mr-0.5 flex h-4 w-4 sm:h-[18px] sm:w-[18px] items-center justify-center rounded-full bg-luxe text-[9px] sm:text-[10px] font-bold text-brand opacity-0 scale-0 transition-all duration-300 pointer-events-none">0</span>

        <img src="images/z01-1-hero.webp" alt="Zahra Series" class="crossfade-img" loading="lazy" />
        <img src="images/m01-1-hero.webp" alt="Maraya Series" class="crossfade-img" loading="lazy" />

      <div class="absolute bottom-6 sm:bottom-12 inset-x-6 sm:inset-x-12 flex flex-col items-center sm:items-start text-center sm:text-left">
        <div class="bg-brand/30 backdrop-blur-md border border-white/20 p-6 sm:p-8 rounded-2xl w-full sm:w-auto shadow-soft transform transition-transform duration-700 group-hover:-translate-y-2">
          <p class="text-luxe text-[10px] sm:text-xs uppercase tracking-[0.2em] font-medium mb-2">Signature Collection</p>
          <h2 class="font-display text-3xl sm:text-5xl text-white mb-4">The Abaya Series</h2>

                  <h3 class="text-xs uppercase text-luxe tracking-widest font-medium">Shipping Details</h3>
              </div>
              <div class="space-y-3">
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <input type="text" id="cart-name" autocomplete="name" maxlength="300" class="w-full bg-black/40 border-b border-white/10 rounded-t-lg rounded-b-none text-white px-4 py-3 text-[15px] focus:border-luxe focus:bg-black/60 outline-none transition-all placeholder:text-white/30" placeholder="Full Name">
                      <input type="tel" id="cart-phone" autocomplete="tel" maxlength="20" class="w-full bg-black/40 border-b border-white/10 rounded-t-lg rounded-b-none text-white px-4 py-3 text-[15px] focus:border-luxe focus:bg-black/60 outline-none transition-all placeholder:text-white/30" placeholder="Phone (e.g. 0123456789)">
                  </div>
                  <input type="email" id="cart-email" autocomplete="email" maxlength="200" class="w-full bg-black/40 border-b border-white/10 rounded-t-lg rounded-b-none text-white px-4 py-3 text-[15px] focus:border-luxe focus:bg-black/60 outline-none transition-all placeholder:text-white/30" placeholder="Email (optional)">
                  <textarea id="cart-address" rows="2" autocomplete="street-address" maxlength="300" class="w-full bg-black/40 border-b border-white/10 rounded-t-lg rounded-b-none text-white px-4 py-3 text-[15px] focus:border-luxe focus:bg-black/60 outline-none transition-all placeholder:text-white/30" placeholder="Address"></textarea>
                  <div class="grid grid-cols-2 gap-3">
                      <input type="text" id="cart-postcode" inputmode="numeric" autocomplete="postal-code" maxlength="5" class="w-full bg-black/40 border-b border-white/10 rounded-t-lg rounded-b-none text-white px-4 py-3 text-[15px] focus:border-luxe focus:bg-black/60 outline-none transition-all placeholder:text-white/30" placeholder="Postcode">
                      <div class="relative">
                          <select id="cart-state" class="w-full bg-black/40 border-b border-white/10 rounded-t-lg rounded-b-none text-white pl-4 pr-10 py-3 text-[15px] focus:border-luxe focus:bg-black/60 outline-none appearance-none transition-all cursor-pointer">
                              <option value="" class="bg-brand">State...</option>
                              <option value="Johor" class="bg-brand">Johor</option><option value="Kedah" class="bg-brand">Kedah</option><option value="Kelantan" class="bg-brand">Kelantan</option><option value="Melaka" class="bg-brand">Melaka</option><option value="Negeri Sembilan" class="bg-brand">Negeri Sembilan</option><option value="Pahang" class="bg-brand">Pahang</option><option value="Perak" class="bg-brand">Perak</option><option value="Perlis" class="bg-brand">Perlis</option><option value="Pulau Pinang" class="bg-brand">Pulau Pinang</option><option value="Sabah" class="bg-brand">Sabah</option><option value="Sarawak" class="bg-brand">Sarawak</option><option value="Selangor" class="bg-brand">Selangor</option><option value="Terengganu" class="bg-brand">Terengganu</option><option value="W.P. Kuala Lumpur" class="bg-brand">W.P. Kuala Lumpur</option><option value="W.P. Labuan" class="bg-brand">W.P. Labuan</option><option value="W.P. Putrajaya" class="bg-brand">W.P. Putrajaya</option>
                          </select>
                          <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-luxe/70">
                              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                          </div>
                      </div>
                  </div>
                  <div id="cart-inline-alert" class="hidden text-[12px] text-rose-300 bg-rose-500/10 border border-rose-500/30 rounded-lg px-3 py-2"></div>
              </div>
          </div>
      </div>

      <div class="p-4 sm:p-6 pb-8 sm:pb-6 border-t border-white/5 bg-ink shrink-0 relative z-10">

              <div class="flex justify-between text-luxe hidden" id="cart-discount-row"><span id="cart-discount-label">Discount</span><span id="cart-discount-amount">-RM 0.00</span></div>
              <div class="flex justify-between text-gray-400"><span>Shipping</span><span id="cart-shipping">Pending</span></div>
              <div class="flex justify-between text-white text-lg font-medium pt-3 border-t border-white/10 mt-3"><span>Grand Total</span><span id="cart-total">RM 0.00</span></div>
          </div>
          <button type="button" id="btn-checkout" class="w-full bg-luxe text-ink font-medium uppercase tracking-widest py-4 rounded-xl hover:opacity-90 transition shadow-soft disabled:opacity-50 disabled:cursor-not-allowed tap-none">Proceed to Payment</button>
