<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Arabista — Tailor Portal</title>
  <meta name="theme-color" content="#0F0F10" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        theme: { 
            extend: { 
                fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'], }, 
                colors: { brand: { DEFAULT: '#0F0F10' }, luxe: { DEFAULT: '#C0A062' }, }, 
            }, 
        }, 
    }
  </script>
  <style>
    body { background-color: #0F0F10; color: white; -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; padding: 12px 16px; width: 100%; outline: none; transition: all 0.2s; font-size: 16px !important; }
    input:focus, select:focus { border-color: #C0A062; background: rgba(192,160,98,0.05); }
    .tab-content { display: none; padding-bottom: 90px; }
    .tab-content.active { display: block; }
    .nav-btn { color: rgba(255,255,255,0.4); transition: color 0.2s; }
    .nav-btn.active { color: #C0A062; }
    .loader { border: 3px solid rgba(192,160,98,0.2); border-top-color: #C0A062; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .status-dot { height: 8px; width: 8px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.syncing { background-color: #3b82f6; animation: blinker 1s linear infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    .lala-track-container { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; position: relative; }
    .lala-track-line { position: absolute; top: 6px; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.1); z-index: 0; }
    .lala-step { position: relative; z-index: 1; text-align: center; flex: 1; }
    .lala-dot { width: 12px; height: 12px; background: #333; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; margin: 0 auto 6px; transition: all 0.3s; }
    .lala-step.active .lala-dot { background: #C0A062; border-color: #C0A062; box-shadow: 0 0 8px rgba(192,160,98,0.5); transform: scale(1.2); }
    .lala-step.completed .lala-dot { background: #22c55e; border-color: #22c55e; }
    .lala-label { font-size: 8px; color: rgba(255,255,255,0.3); text-transform: uppercase; font-weight: 600; line-height: 1.1; display: block; }
    .lala-step.active .lala-label { color: #C0A062; }
    .lala-step.completed .lala-label { color: #22c55e; }
  </style>
</head>
<body class="antialiased h-[100dvh] flex flex-col overflow-hidden">

  <div id="login-screen" class="flex-1 flex flex-col items-center justify-center px-6 fade-in z-50 bg-brand absolute inset-0">
      <img src="images/logo-88.webp" alt="Arabista" class="w-20 h-20 mb-8 opacity-80">
      <h1 class="text-2xl font-bold mb-2" data-t="login_title">Tailor Portal</h1>
      <p class="text-white/50 text-sm mb-8 text-center" data-t="login_desc">Enter your registered Hub Phone Number and PIN.</p>
      <div class="w-full max-w-sm space-y-4">
          <div>
              <label class="block text-xs text-white/50 uppercase tracking-widest mb-1.5" data-t="lbl_phone">Phone Number</label>
              <input type="tel" id="login-phone" placeholder="e.g. 60123456001">
          </div>
          <div>
              <label class="block text-xs text-white/50 uppercase tracking-widest mb-1.5" data-t="lbl_pin">6-Digit PIN</label>
              <input type="password" id="login-pin" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="••••••" maxlength="6">
          </div>
          <button id="btn-login" onclick="login()" class="w-full bg-luxe text-brand font-bold py-3.5 rounded-xl hover:bg-white transition mt-4 flex justify-center items-center" data-t="btn_login">Login securely</button>
      </div>
  </div>

  <div id="main-app" class="hidden flex-1 flex flex-col h-full overflow-hidden relative">
      <header class="bg-[#151618] border-b border-white/5 px-4 py-3 flex justify-between items-center z-20 shadow-md">
          <div class="flex flex-col">
              <div class="flex items-center gap-2">
                  <span class="text-[10px] text-luxe uppercase tracking-widest font-bold" data-t="lbl_active_hub">Active Hub</span>
                  <div class="flex items-center bg-white/5 rounded-full px-2 py-0.5 border border-white/5">
                      <span id="statusDot" class="status-dot"></span>
                      <span id="statusText" class="text-[9px] text-white/60 font-medium" data-t="txt_online">Online</span>
                  </div>
              </div>
              <h2 class="text-sm font-bold text-white truncate max-w-[150px] leading-tight mt-0.5" id="header-hub-name">...</h2>
          </div>
          
          <div class="flex items-center gap-3">
              <div class="flex items-center gap-2 border border-white/20 rounded-lg px-2 py-1 h-8">
                  <button onclick="setLang('en')" id="lang-en" class="text-xs font-bold text-luxe">EN</button>
                  <span class="text-white/20 text-xs">|</span>
                  <button onclick="setLang('bm')" id="lang-bm" class="text-xs text-white/50 hover:text-white transition">BM</button>
              </div>
              <button onclick="logout()" class="text-xs text-white/40 hover:text-white transition ml-1" data-t="btn_logout">Logout</button>
          </div>
      </header>

      <div class="flex-1 overflow-y-auto px-4 py-6 scroll-smooth relative" id="scroll-area">
          
          <div id="tab-dashboard" class="tab-content active fade-in">
              <div class="flex justify-between items-center mb-4">
                  <h3 class="text-lg font-bold" data-t="title_timeline">Orders Timeline</h3>
                  <button onclick="loadDashboard(false, true)" class="p-2 text-luxe hover:bg-white/5 rounded-full transition border border-luxe/30 shadow-sm flex items-center justify-center gap-1.5 px-3" title="Refresh">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                      <span class="text-xs font-bold" data-t="btn_refresh">Refresh</span>
                  </button>
              </div>
              <div id="dash-loader" class="flex flex-col items-center justify-center py-10 text-white/50 text-sm hidden">
                  <div class="loader mb-3"></div> 
                  <span data-t="txt_syncing">Syncing database...</span>
              </div>

              <button onclick="toggleSection('list-requests', 'icon-requests')" class="w-full flex justify-between items-center text-xs text-luxe uppercase tracking-widest font-bold mb-3 border-b border-luxe/20 pb-2 hover:text-white transition">
                  <span id="header-requests-text" data-t="header_requests">New Requests (Approval)</span>
                  <svg id="icon-requests" class="w-4 h-4 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </button>
              <div id="list-requests" class="space-y-3 mb-8 transition-all overflow-hidden"></div>

              <button onclick="toggleSection('list-pending', 'icon-pending')" class="w-full flex justify-between items-center text-xs text-white/40 uppercase tracking-widest font-bold mb-3 border-b border-white/10 pb-2 hover:text-white transition">
                  <span id="header-pending-text" data-t="header_pending">Expected Arrivals</span>
                  <svg id="icon-pending" class="w-4 h-4 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </button>
              <div id="list-pending" class="space-y-3 mb-8 transition-all overflow-hidden"></div>

              <button onclick="toggleSection('list-active', 'icon-active')" class="w-full flex justify-between items-center text-xs text-white/40 uppercase tracking-widest font-bold mb-3 border-b border-white/10 pb-2 hover:text-white transition">
                  <span id="header-active-text" data-t="header_active">Currently Altering</span>
                  <svg id="icon-active" class="w-4 h-4 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </button>
              <div id="list-active" class="space-y-3 transition-all overflow-hidden mb-8"></div>

              <button onclick="toggleSection('list-completed-container', 'icon-completed')" class="w-full flex justify-between items-center text-xs text-white/40 uppercase tracking-widest font-bold mb-3 border-b border-white/10 pb-2 hover:text-white transition">

                  </div>
                  <div id="list-completed" class="space-y-3 pb-6"></div>
              </div>
          </div>

          <div id="tab-search" class="tab-content fade-in">

                  </button>
              </div>
              <div id="list-search" class="space-y-3"></div>
          </div>

          <div id="tab-profile" class="tab-content fade-in">
              <h3 class="text-lg font-bold mb-4" data-t="title_settings">Hub Settings</h3>
              <div class="space-y-4 bg-white/5 p-4 rounded-xl border border-white/10">
                  <div>
                      <label class="block text-xs text-white/50 mb-1" data-t="lbl_address">Shop Address</label>

                          </button>

                      <input type="tel" id="prof-phone" class="text-sm">
                  </div>
                  <div>
                      <label class="block text-xs text-white/50 mb-1" data-t="lbl_capacity">Max Active Queue Capacity</label>
                      <input type="number" id="prof-capacity" class="text-sm text-luxe font-bold">
                  </div>
                  <div class="grid grid-cols-2 gap-3">
                      <div><label class="block text-xs text-white/50 mb-1" data-t="lbl_open">Open Time</label><input type="time" id="prof-open" class="text-sm"></div>
                      <div><label class="block text-xs text-white/50 mb-1" data-t="lbl_close">Close Time</label><input type="time" id="prof-close" class="text-sm"></div>
                  </div>
                  <div>

          </div>
      </nav>
  </div>

    let hubName = localStorage.getItem('arabista_hub_name') || "";
    let hubToken = localStorage.getItem('arabista_hub_token') || ""; 
    let hubLat = ""; let hubLng = ""; let hubDays = "";
    let completedOrdersData = [];
    let previousPendingCount = -1;
    let previousActionMap = new Map();
    let currentLang = 'en';
    
    let lastSyncTime = 0;

    // --- SECURITY UTILITIES ---
    function sanitizeHTML(str) {
        if (!str) return "";
        return String(str)
            .replace(/&/g, "&" + "amp;")
            .replace(/</g, "&" + "lt;")
            .replace(/>/g, "&" + "gt;")
            .replace(/"/g, "&" + "quot;")
            .replace(/'/g, "&" + "#39;");
    }

    function escapeJS(str) {
        if (!str) return "";
        return String(str)
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\" + "'")
            .replace(/"/g, '\\"');
    }

    document.addEventListener('DOMContentLoaded', () => { 
        const storedVersion = localStorage.getItem('arabista_app_version');
        if (storedVersion !== APP_VERSION) { 
            localStorage.removeItem('arabista_hub_name');
            localStorage.removeItem('arabista_hub_token');
            localStorage.setItem('arabista_app_version', APP_VERSION); 
            hubName = "";
            hubToken = "";
        }
        
        const userLang = navigator.language || navigator.userLanguage;
        const initialLang = (userLang && (userLang.toLowerCase().startsWith('ms') || userLang.toLowerCase().startsWith('bm'))) ? 'bm' : 'en';
        setLang(initialLang);
        
        if(hubName && hubToken) { 
            document.getElementById('login-screen').classList.add('hidden'); 
            document.getElementById('main-app').classList.remove('hidden'); 
            document.getElementById('header-hub-name').innerText = sanitizeHTML(hubName); 
            requestNotificationPermission();
            loadDashboard(); 
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-t]').forEach(el => { 
            if(t[lang][el.getAttribute('data-t')]) el.innerHTML = t[lang][el.getAttribute('data-t')]; 
        });
        document.querySelectorAll('[data-t-placeholder]').forEach(el => { 
            if(t[lang][el.getAttribute('data-t-placeholder')]) el.placeholder = t[lang][el.getAttribute('data-t-placeholder')]; 
        });
        
        const btnEn = document.getElementById('lang-en'); 
        const btnBm = document.getElementById('lang-bm');
        if(btnEn && btnBm) {
            btnEn.className = lang === 'en' ? "text-xs font-bold text-luxe" : "text-xs text-white/50 hover:text-white transition";
            btnBm.className = lang === 'bm' ? "text-xs font-bold text-luxe" : "text-xs text-white/50 hover:text-white transition";
        }
        
        const activeOrders = document.getElementById('list-active').innerHTML;
        if(activeOrders.length > 200) loadDashboard(true, true);
    }

    function updateConnectionStatus(isSyncing) {
        const dot = document.getElementById('statusDot'); 
        const text = document.getElementById('statusText');
        if(isSyncing) { 
            dot.classList.add('syncing'); 
            text.innerText = t[currentLang].txt_syncing_status; 
        } else { 
            dot.classList.remove('syncing'); 
            text.innerText = t[currentLang].txt_online; 
        }
    }

    function sanitizePhone(phone) { 
        let p = phone.replace(/\D/g, ''); 
        if (p.startsWith('0')) p = '6' + p; 
        else if (!p.startsWith('60') && p.length >= 9) p = '60' + p; 
        return p; 
    }

    function formatDate(dateStr) { 
        if(!dateStr) return ""; 
        const d = new Date(dateStr); 
        if(isNaN(d)) return dateStr; 
        const options = { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' }; 
        return d.toLocaleDateString(currentLang === 'bm' ? 'ms-MY' : 'en-GB', options); 
    }

    let startY = 0; 
    const scrollArea = document.getElementById('scroll-area');
    
    scrollArea.addEventListener('touchstart', (e) => { 
        if (scrollArea.scrollTop === 0) startY = e.touches[0].clientY; 
    }, {passive: true});
    
    scrollArea.addEventListener('touchend', (e) => { 
        if (startY > 0 && scrollArea.scrollTop === 0) { 
            let endY = e.changedTouches[0].clientY; 
            if (endY - startY > 80) { 
                if(document.getElementById('tab-dashboard').classList.contains('active')) {
                    loadDashboard(false, true); 
                }
            } 
        } 
        startY = 0; 
    }, {passive: true});

    function toggleSection(listId, iconId) {
        const list = document.getElementById(listId); 
        const icon = document.getElementById(iconId);
        if (list.classList.contains('hidden')) { 
            list.classList.remove('hidden'); 
            icon.classList.remove('rotate-180'); 
        } else { 
            list.classList.add('hidden'); 
            icon.classList.add('rotate-180'); 
        }
    }

    function unlockAddress() { 
        const addrInput = document.getElementById('prof-address'); 
        addrInput.removeAttribute('readonly'); 
        addrInput.classList.remove('opacity-70', 'cursor-not-allowed'); 
        addrInput.focus(); 
        alert(t[currentLang].edit_addr_warn);

    function requestNotificationPermission() { 
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") { 
            Notification.requestPermission(); 
        } 
    }

    function playAlert(type) {
        try {
            let soundUrl = 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'; 
            if (type === 2) soundUrl = 'https://assets.mixkit.co/active_storage/sfx/2870/2870-preview.mp3'; 
            if (type === 3) soundUrl = 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'; 
            
            const msg = type === 1 ? t[currentLang].msg_new_order : t[currentLang].alert_action_required;
            const audio = new Audio(soundUrl); 
            audio.volume = 1.0; 
            audio.play().catch(e => console.log("Audio autoplay blocked.", e));
            
            if ("Notification" in window && Notification.permission === "granted") { 
                new Notification("Arabista", { body: msg, icon: "images/logo-88.webp" }); 
            }
        } catch (e) {}
    }

    async function login() {
        let rawPhone = document.getElementById('login-phone').value.trim(); 
        const phone = sanitizePhone(rawPhone); 
        const pin = document.getElementById('login-pin').value.trim();
        
        if(!phone || !pin) return alert(t[currentLang].alert_both);
        
        const btn = document.getElementById('btn-login'); 
        const orig = btn.innerHTML; 
        btn.innerHTML = `${spinnerSvg} ${t[currentLang].msg_verifying}`; 
        btn.disabled = true; 
        btn.classList.add('opacity-70');
        
        try {
            const res = await fetch(scriptURL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ action: "hub_login", phone: phone, pin: pin }) 
            });
            const data = await res.json();
            
            if(data.status === "success" && data.token) { 
                hubName = data.hub_name; 
                hubToken = data.token; 
                localStorage.setItem('arabista_hub_name', hubName); 
                localStorage.setItem('arabista_hub_token', hubToken); 
                localStorage.setItem('arabista_app_version', APP_VERSION); 
                
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('main-app').classList.remove('hidden'); 
                document.getElementById('header-hub-name').innerText = sanitizeHTML(hubName); 
                
                requestNotificationPermission();
                loadDashboard(false, true); 
            } else { 
                throw new Error(data.message || t[currentLang].alert_invalid); 
            }
        } catch (e) { 
            alert(e.message); 
            btn.innerHTML = orig; 
            btn.disabled = false; 
            btn.classList.remove('opacity-70'); 
        }
    }

    function logout() { 
        localStorage.removeItem('arabista_hub_name'); 
        localStorage.removeItem('arabista_hub_token'); 
        window.location.reload(); 
    }

    function switchTab(tabId) { 
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); 
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active')); 
        document.getElementById(`tab-${tabId}`).classList.add('active'); 
        document.getElementById(`nav-${tabId}`).classList.add('active'); 
        scrollArea.scrollTo(0,0); 
    }

    async function loadDashboard(isSilent = false, forceRefresh = false) {
        if (!isSilent) document.getElementById('dash-loader').classList.remove('hidden'); 
        if (isSilent) updateConnectionStatus(true);
        if (forceRefresh) lastSyncTime = 0; 
        
        try {
            const res = await fetch(scriptURL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ action: "get_dashboard", hub_name: hubName, token: hubToken, last_sync: lastSyncTime }) 
            });
            const data = await res.json(); 
            
            if (!isSilent) document.getElementById('dash-loader').classList.add('hidden');
            if (isSilent) setTimeout(() => updateConnectionStatus(false), 1000);

            if (data.status === "error") {
                if(data.message.includes("Unauthorized")) return logout();
                throw new Error(data.message);
            }

            if (data.status === "no_change") {
                if (data.timestamp) lastSyncTime = data.timestamp;
                return;
            }

            if(data.status === "success") { 
                if (data.timestamp) lastSyncTime = data.timestamp; 
                
                const newPendingCount = data.orders.pending.length;
                if (previousPendingCount !== -1 && newPendingCount > previousPendingCount) { playAlert(1); }
                previousPendingCount = newPendingCount;
                
                const currentReadyOrders = (data.orders.inProgress || []).filter(o => o.status === "Ready for Return");
                currentReadyOrders.forEach(o => {
                    const prevOutbound = previousActionMap.get(o.id);
                    if (previousActionMap.has(o.id) && !prevOutbound && o.outbound && o.outbound !== "") { playAlert(2); }
                    previousActionMap.set(o.id, o.outbound);
                });
                
                renderPending(data.orders.pending);
                renderActive(data.orders.inProgress.concat(data.orders.ready)); 
                
                completedOrdersData = data.orders.completed || []; 
                renderCompleted(); 
                populateProfile(data.profile); 
            }
        } catch (e) { 
            if (!isSilent) { 
                alert(t[currentLang].alert_sync_fail); 
                document.getElementById('dash-loader').classList.add('hidden'); 
            } 
            updateConnectionStatus(false); 
        }
    }

        const icon = document.getElementById('icon-active');
        
        document.getElementById('header-active-text').innerHTML = `${t[currentLang].header_active} <span class="text-luxe font-bold ml-1">[ ${orders.length} ]</span>`;
        
        if(orders.length === 0) { 
            list.classList.add('hidden'); 
            icon.classList.add('rotate-180'); 
            list.innerHTML = `<p class="text-white/30 text-xs text-center py-4">${t[currentLang].txt_no_active}</p>`; 
            return; 
        } else { 
            list.classList.remove('hidden'); 
            icon.classList.remove('rotate-180'); 
        }
        
        orders.sort((a,b) => new Date(a.date) - new Date(b.date));
        
        let actHtml = ''; 
        orders.forEach(o => {
            const safeId = sanitizeHTML(o.id);
            const safeName = sanitizeHTML(o.custName);
            const safePhone = sanitizeHTML(o.custPhone);
            const safeItems = sanitizeHTML(o.items).replace(/\[/g, '').replace(/\]/g, '');
            const jsId = escapeJS(safeId);
            const jsName = escapeJS(safeName);
            const jsPhone = escapeJS(safePhone);
            
            const link = `${trackerBaseUrl}${safeId}`; 
            let actionHtml = '';
            
            const daysOld = Math.floor((new Date() - new Date(o.date)) / (1000*60*60*24));
            const ageBadge = daysOld >= 3 ? `<span class="text-[9px] bg-red-500/20 text-red-400 px-2 py-0.5 rounded shadow-sm border border-red-500/30">⏳ ${t[currentLang].waiting_days} ${daysOld} ${t[currentLang].days}</span>` : '';
            
            let modeBadge = "";
            if (o.outbound === "Lalamove" || o.direction === "Outbound") modeBadge = `<span class="text-[9px] bg-purple-500/20 text-purple-400 px-2 py-0.5 rounded border border-purple-500/30 mt-1 inline-block">${t[currentLang].badge_out_lala}</span>`;
            else if (o.outbound === "Self-Pickup") modeBadge = `<span class="text-[9px] bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded border border-orange-500/30 mt-1 inline-block">${t[currentLang].badge_out_self}</span>`;
            else modeBadge = `<span class="text-[9px] bg-gray-500/20 text-gray-400 px-2 py-0.5 rounded border border-gray-500/30 mt-1 inline-block">${t[currentLang].badge_out_wait}</span>`;

            if (o.status === "In Progress") { 
                 actionHtml = `
                    <button onclick="updateStatus('${jsId}', 'Ready for Return', '${jsName}', '${jsPhone}', '${link}', 1.5, this)" class="flex-1 bg-luxe text-brand font-bold py-2.5 rounded-lg text-xs hover:bg-white transition shadow-soft flex justify-center items-center">
                        ${t[currentLang].btn_mark_completed}
                    </button>`; 
            } 
            else if (o.status === "Ready for Return") { 
                 if (!o.outbound || o.outbound === "") {
                     actionHtml = `
                        <button disabled class="flex-1 bg-white/5 text-white/30 font-bold py-2.5 rounded-lg text-xs border border-white/5 cursor-not-allowed">
                            ${t[currentLang].btn_wait_choice}
                        </button>`; 
                 } else if (o.outbound === "Self-Pickup") {
                     actionHtml = `
                        <button onclick="updateStatus('${jsId}', 'Completed', '', '', '', 0, this)" class="flex-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 font-bold py-2.5 rounded-lg text-xs hover:bg-blue-500/20 transition flex justify-center items-center">
                            ${t[currentLang].btn_cust_pickup}
                        </button>`; 
                 } else if (o.outbound === "Lalamove") {
                     actionHtml = `
                        <button disabled class="flex-1 bg-orange-500/20 text-orange-300 border border-orange-500/30 font-bold py-2.5 rounded-lg text-xs cursor-not-allowed flex justify-center items-center gap-1">
                            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 
                            ${t[currentLang].btn_wait_booking}
                        </button>`; 
                 }
            } 
            else if (o.status === "Dispatched") { 
                 actionHtml = `
                    <button onclick="updateStatus('${jsId}', 'Completed', '', '', '', 0, this)" class="flex-1 bg-green-500/10 text-green-400 border border-green-500/20 font-bold py-2.5 rounded-lg text-xs hover:bg-green-500/20 transition flex justify-center items-center">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 
                        ${t[currentLang].btn_override}
                    </button>`; 
            }
            
            let trackerHtml = "";
            if (o.status === "Dispatched") {
                 const displayStatus = o.lalamoveStatus || sessionStorage.getItem('lala_status_' + safeId) || 'ASSIGNING_DRIVER';
                 trackerHtml = `
                    <div class="mt-3 mb-3 pt-3 border-t border-white/5">
                        <div class="lala-track-container w-full">
                            <div class="lala-track-line"></div>
                            ${renderLalamoveSteps(displayStatus)}
                        </div>
                    </div>`;
            }

            actHtml += `
                <div class="bg-[#1A1B1E] border ${o.status === 'Ready for Return' ? 'border-luxe/50' : 'border-white/5'} rounded-xl p-4 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-white/70 font-mono">${safeId}</span>
                            <span class="text-[10px] text-white/40">${formatDate(o.date)}</span>
                            ${ageBadge}
                        </div>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded ${o.status === 'Ready for Return' ? 'bg-luxe text-brand' : 'bg-white/10 text-white/70'}">${sanitizeHTML(o.status)}</span>
                    </div>
                    <div class="mb-2">${modeBadge}</div>
                    <div class="flex justify-between items-center mb-3">
                        <p class="font-bold text-base text-white">${safeName}</p>
                        <a href="tel:${safePhone}" class="p-2 bg-white/5 hover:bg-white/10 rounded-full text-white/70 transition" title="Call Customer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </a>
                    </div>
                    <p class="text-xs text-white/50 mb-4 whitespace-pre-line">${safeItems}</p>
                    ${trackerHtml}
                    <div class="flex gap-2 w-full">${actionHtml}</div>
                </div>`;
        });
        list.innerHTML = actHtml; 
    }

    function renderLalamoveSteps(status) {
        const steps = [{label: t[currentLang].step_assigning},{label: t[currentLang].step_found},{label: t[currentLang].step_picked_up},{label: t[currentLang].step_delivered}];
        let activeIdx = 0;
        if(status === 'ON_GOING') activeIdx = 1; 
        if(status === 'PICKED_UP') activeIdx = 2; 
        if(status === 'COMPLETED') activeIdx = 3;
        
        return steps.map((s, i) => `
            <div class="lala-step ${i <= activeIdx ? (i === activeIdx ? 'active' : 'completed') : ''}">
                <div class="lala-dot"></div>
                <span class="lala-label">${s.label}</span>
            </div>`).join('');
    }

    function renderCompleted() {
        const list = document.getElementById('list-completed');
        if(completedOrdersData.length === 0) {
            return list.innerHTML = `<p class="text-white/30 text-xs text-center py-4">${t[currentLang].txt_no_completed}</p>`;
        }
        
        completedOrdersData.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        let html = ''; 
        completedOrdersData.forEach(o => { 
            const safeId = sanitizeHTML(o.id);
            const safeName = sanitizeHTML(o.custName);
            const safeItems = sanitizeHTML(o.items).replace(/\[/g, '').replace(/\]/g, '');

            html += `
                <div class="bg-white/5 border border-white/10 rounded-xl p-3 shadow-sm opacity-70 hover:opacity-100 transition">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-white/50 font-mono">${safeId}</span>
                            <span class="text-[10px] text-white/40">${formatDate(o.date)}</span>
                        </div>
                        <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded">${t[currentLang].status_completed}</span>
                    </div>
                    <p class="font-bold text-sm text-white/80 mb-1">${safeName}</p>
                    <p class="text-[10px] text-white/40 whitespace-pre-line truncate">${safeItems}</p>
                </div>`; 
        });
        list.innerHTML = html; 
    }

    async function updateStatus(id, newStatus, custName, phone, link, milestone, btn) {
        if(!confirm(t[currentLang].confirm_update.replace('{status}', newStatus))) return;
        
        const orig = btn.innerHTML; 
        btn.innerHTML = `${spinnerSvg} ${t[currentLang].msg_updating}`; 
        btn.disabled = true; 
        btn.classList.add('opacity-70', 'cursor-not-allowed');
        
        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ action: "update_order_status", hub_name: hubName, token: hubToken, order_id: id, new_status: newStatus }) 
            });
            
            if (newStatus === "Rejected") {
                sendWA(phone, t[currentLang].wa_rejected.replace('{id}', id).replace('{link}', link));
            } else if (milestone === 1) {
                sendWA(phone, t[currentLang].wa_received.replace('{id}', id).replace('{link}', link));
            } else if (milestone === 1.5) {
                sendWA(phone, t[currentLang].wa_completed.replace('{id}', id).replace('{link}', link));
            } else if (milestone === 2) {
                if (newStatus === "Pending Dropoff") {
                    sendWA(phone, t[currentLang].wa_approved_walkin.replace('{id}', id).replace('{link}', link));
                } else {
                    sendWA(phone, t[currentLang].wa_approved_lala.replace('{id}', id).replace('{link}', link));
                }
            }
            
            loadDashboard(false, true); 
        } catch (e) { 
            alert(t[currentLang].alert_err_update); 
            btn.innerHTML = orig; 
            btn.disabled = false; 
            btn.classList.remove('opacity-70', 'cursor-not-allowed'); 
        }
    }

    function sendWA(phone, msg) { 
        let cleanPhone = phone.replace(/[^0-9]/g, ''); 
        if (cleanPhone.startsWith('0')) cleanPhone = '6' + cleanPhone; 
        window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank'); 
    }

    async function searchOrders() {
        const query = document.getElementById('search-input').value.trim(); 
        if(!query) return;
        
        const btn = document.getElementById('btn-search'); 
        const orig = btn.innerHTML; 
        btn.innerHTML = spinnerSvg; 
        btn.disabled = true;
        document.getElementById('list-search').innerHTML = '';
        
        try {
            const res = await fetch(scriptURL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ action: "search_order", hub_name: hubName, token: hubToken, query: query }) 
            });
            const data = await res.json(); 
            
            if (data.status === "error") throw new Error(data.message);

            btn.innerHTML = orig; 
            btn.disabled = false;
            
            if (data.results.length === 0) {
                document.getElementById('list-search').innerHTML = `<p class="text-white/30 text-xs text-center py-4">${t[currentLang].txt_no_results}</p>`;
            } else {
                let sHtml = ''; 
                data.results.forEach(o => { 
                    const safeId = sanitizeHTML(o.id);
                    const safeName = sanitizeHTML(o.custName);
                    const safePhone = sanitizeHTML(o.custPhone);
                    const safeStatus = sanitizeHTML(o.status);
                    const safeItems = sanitizeHTML(o.items);

                    sHtml += `
                        <div class="bg-white/5 border border-white/10 rounded-xl p-4">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[10px] font-mono text-white/50">${safeId}</span>
                                <span class="text-[10px] text-luxe font-bold px-2 py-0.5 bg-luxe/10 rounded">${safeStatus}</span>
                            </div>
                            <p class="text-[10px] text-white/30 mb-2">${formatDate(o.date)}</p>
                            <p class="font-bold text-sm mb-1">${safeName} <span class="text-white/40 font-normal ml-2">${safePhone}</span></p>
                            <p class="text-xs text-white/50 truncate">${safeItems}</p>
                        </div>`; 
                });
                document.getElementById('list-search').innerHTML = sHtml; 
            }
        } catch(e) { 
            if(e.message.includes("Unauthorized")) return logout();
            alert(t[currentLang].alert_search_fail); 
            btn.innerHTML = orig; 
            btn.disabled = false; 
        }
    }

    function populateProfile(p) { 
        if(!p || !p.address) return;
        const addrInput = document.getElementById('prof-address'); 
        addrInput.value = p.address; 
        addrInput.setAttribute('readonly', true); 
        addrInput.classList.add('opacity-70', 'cursor-not-allowed'); 
        
        document.getElementById('prof-phone').value = p.phone; 
        document.getElementById('prof-open').value = p.open; 
        document.getElementById('prof-close').value = p.close; 
        document.getElementById('prof-status').value = p.status; 
        document.getElementById('prof-capacity').value = p.max_capacity; 
        
        hubLat = p.lat; 
        hubLng = p.lng; 
        hubDays = p.days; 
        document.getElementById('prof-gps').innerText = `${hubLat}, ${hubLng}`; 
    }

    function updateGPS(btn) {
        if(!navigator.geolocation) return alert("Geo not supported");
        
        const orig = btn.innerHTML; 
        btn.innerHTML = spinnerSvg; 
        btn.disabled = true;
        document.getElementById('prof-gps').innerText = t[currentLang].msg_locating;
        
        navigator.geolocation.getCurrentPosition(pos => {
            hubLat = pos.coords.latitude.toFixed(6); 
            hubLng = pos.coords.longitude.toFixed(6);
            document.getElementById('prof-gps').innerText = `${hubLat}, ${hubLng}`; 
            btn.innerHTML = orig; 
            btn.disabled = false;
        }, () => { 
            alert(t[currentLang].alert_gps_fail); 
            btn.innerHTML = orig; 
            btn.disabled = false; 
        }, { enableHighAccuracy: true });
    }

    async function saveProfile() {
        const btn = document.getElementById('btn-save-prof'); 
        const orig = btn.innerHTML; 
        btn.innerHTML = `${spinnerSvg} ${t[currentLang].msg_saving}`; 
        btn.disabled = true; 
        btn.classList.add('opacity-70');
        
        const payload = { 
            action: "update_profile", 
            hub_name: hubName, 
            token: hubToken,
            address: document.getElementById('prof-address').value, 
            phone: sanitizePhone(document.getElementById('prof-phone').value), 
            lat: hubLat, 
            lng: hubLng, 
            days: hubDays, 
            open: document.getElementById('prof-open').value, 
            close: document.getElementById('prof-close').value, 
            status: document.getElementById('prof-status').value, 
            max_capacity: document.getElementById('prof-capacity').value 
        };
        
        try {
            const res = await fetch(scriptURL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify(payload) 
            });
            const data = await res.json();
            if(data.status === "error") throw new Error(data.message);

            btn.innerHTML = t[currentLang].msg_saved; 
            const addrInput = document.getElementById('prof-address'); 
            addrInput.setAttribute('readonly', true); 
            addrInput.classList.add('opacity-70', 'cursor-not-allowed');
            setTimeout(() => { 
                btn.innerHTML = orig; 
                btn.disabled = false; 
                btn.classList.remove('opacity-70'); 
            }, 2000);
        } catch(e) { 
            if(e.message.includes("Unauthorized")) return logout();
            alert(t[currentLang].alert_save_fail); 
            btn.innerHTML = orig; 
            btn.disabled = false; 
            btn.classList.remove('opacity-70'); 
        }
    }
  </script>
</body>
