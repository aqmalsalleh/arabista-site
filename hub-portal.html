<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Arabista — Tailor Portal</title>
  <meta name="theme-color" content="#0F0F10" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'], },
          colors: { brand: { DEFAULT: '#0F0F10' }, luxe: { DEFAULT: '#C0A062' }, },
        },
      },
    }
  </script>
  <style>
    body { background-color: #0F0F10; color: white; -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; padding: 12px 16px; width: 100%; outline: none; }
    input:focus, select:focus { border-color: #C0A062; background: rgba(192,160,98,0.05); }
    .tab-content { display: none; padding-bottom: 90px; }
    .tab-content.active { display: block; }
    .nav-btn { color: rgba(255,255,255,0.4); transition: color 0.2s; }
    .nav-btn.active { color: #C0A062; }
    .loader { border: 3px solid rgba(192,160,98,0.2); border-top-color: #C0A062; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden">

  <div id="login-screen" class="flex-1 flex flex-col items-center justify-center px-6 fade-in z-50 bg-brand absolute inset-0">
      <img src="images/logo-88.webp" alt="Arabista" class="w-20 h-20 mb-8 opacity-80">
      <h1 class="text-2xl font-bold mb-2">Tailor Portal</h1>
      <p class="text-white/50 text-sm mb-8 text-center">Enter your registered Hub Phone Number and PIN.</p>
      
      <div class="w-full max-w-sm space-y-4">
          <div>
              <label class="block text-xs text-white/50 uppercase tracking-widest mb-1.5">Phone Number</label>
              <input type="tel" id="login-phone" placeholder="e.g. 60123456001">
          </div>
          <div>
              <label class="block text-xs text-white/50 uppercase tracking-widest mb-1.5">6-Digit PIN</label>
              <input type="password" id="login-pin" placeholder="••••••" maxlength="6" pattern="\d*">
          </div>
          <button id="btn-login" onclick="login()" class="w-full bg-luxe text-brand font-bold py-3.5 rounded-xl hover:bg-white transition mt-4 flex justify-center items-center">
              Login securely
          </button>
      </div>
  </div>

  <div id="main-app" class="hidden flex-1 flex flex-col h-full overflow-hidden relative">
      
      <header class="bg-[#151618] border-b border-white/5 px-4 py-4 flex justify-between items-center z-20">
          <div>
              <p class="text-[10px] text-luxe uppercase tracking-widest font-bold">Active Hub</p>
              <h2 class="text-base font-bold text-white truncate max-w-[200px]" id="header-hub-name">...</h2>
          </div>
          <button onclick="logout()" class="text-xs text-white/40 hover:text-white transition">Logout</button>
      </header>

      <div class="flex-1 overflow-y-auto px-4 py-6 scroll-smooth" id="scroll-area">
          
          <div id="tab-dashboard" class="tab-content active fade-in">
              <div class="flex justify-between items-center mb-4">
                  <h3 class="text-lg font-bold">Active Orders</h3>
                  <button onclick="loadDashboard()" class="p-2 text-luxe hover:bg-white/5 rounded-full transition">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                  </button>
              </div>
              
              <div id="dash-loader" class="flex flex-col items-center justify-center py-10 text-white/50 text-sm hidden">
                  <div class="loader mb-3"></div> Syncing database...
              </div>

              <h4 class="text-xs text-white/40 uppercase tracking-widest font-bold mb-3 border-b border-white/10 pb-2">Expected Arrivals (Pending)</h4>
              <div id="list-pending" class="space-y-3 mb-8"></div>

              <h4 class="text-xs text-white/40 uppercase tracking-widest font-bold mb-3 border-b border-white/10 pb-2">Currently Altering (In Progress / Ready)</h4>
              <div id="list-active" class="space-y-3"></div>
          </div>

          <div id="tab-search" class="tab-content fade-in">
              <h3 class="text-lg font-bold mb-4">Find Order</h3>
              <div class="flex gap-2 mb-6">
                  <input type="text" id="search-input" placeholder="Search ID, Name, or Phone..." class="flex-1 py-3">
                  <button onclick="searchOrders()" class="bg-white/10 px-4 rounded-xl text-white hover:bg-white/20 transition">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  </button>
              </div>
              <div id="search-loader" class="loader mx-auto hidden mb-4"></div>
              <div id="list-search" class="space-y-3"></div>
          </div>

          <div id="tab-profile" class="tab-content fade-in">
              <h3 class="text-lg font-bold mb-4">Hub Settings</h3>
              <div class="space-y-4 bg-white/5 p-4 rounded-xl border border-white/10">
                  <div><label class="block text-xs text-white/50 mb-1">Shop Address</label><input type="text" id="prof-address"></div>
                  
                  <div class="flex items-center justify-between p-3 bg-luxe/10 border border-luxe/20 rounded-lg">
                      <div>
                          <p class="text-xs text-luxe font-bold">GPS Coordinates</p>
                          <p class="text-[10px] text-white/60 font-mono mt-0.5" id="prof-gps">...</p>
                      </div>
                      <button onclick="updateGPS()" class="text-xs bg-luxe text-brand px-3 py-1.5 rounded font-bold shadow-soft">Update GPS</button>
                  </div>
                  
                  <div><label class="block text-xs text-white/50 mb-1">Telephone</label><input type="tel" id="prof-phone"></div>
                  <div class="grid grid-cols-2 gap-3">
                      <div><label class="block text-xs text-white/50 mb-1">Open Time</label><input type="time" id="prof-open"></div>
                      <div><label class="block text-xs text-white/50 mb-1">Close Time</label><input type="time" id="prof-close"></div>
                  </div>
                  <div>
                      <label class="block text-xs text-white/50 mb-1">Status</label>
                      <select id="prof-status"><option value="Active">Active (Accepting Orders)</option><option value="Inactive">Inactive (On Holiday)</option></select>
                  </div>
                  <button id="btn-save-prof" onclick="saveProfile()" class="w-full bg-white text-brand font-bold py-3 rounded-xl mt-2">Save Changes</button>
              </div>
          </div>

      </div>

      <nav class="absolute bottom-0 inset-x-0 bg-[#151618] border-t border-white/10 pb-safe z-50">
          <div class="flex justify-around items-center h-16 px-2">
              <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active flex-1 flex flex-col items-center justify-center gap-1">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                  <span class="text-[10px] font-medium">Orders</span>
              </button>
              <button onclick="switchTab('search')" id="nav-search" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  <span class="text-[10px] font-medium">Search</span>
              </button>
              <button onclick="switchTab('profile')" id="nav-profile" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                  <span class="text-[10px] font-medium">Settings</span>
              </button>
          </div>
      </nav>
  </div>

  <script>
    // --- APP SCRIPT URL ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyrJFfuCrhAbdwzAj8uP4sSvFuzRzzzEFV5CHOCBSOK6OGlIXPtsf7-XEfjLHGnFZiyvw/exec'; // IMPORTANT: Use your deployed URL!
    const trackerBaseUrl = 'https://aqmalsalleh.github.io/arabista-site/alteration-tracker.html?id=';
    
    let hubName = localStorage.getItem('arabista_hub_name') || "";
    let hubLat = ""; let hubLng = ""; let hubDays = "";

    document.addEventListener('DOMContentLoaded', () => {
        if(hubName) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('header-hub-name').innerText = hubName;
            loadDashboard();
        }
    });

    async function login() {
        const phone = document.getElementById('login-phone').value.trim();
        const pin = document.getElementById('login-pin').value.trim();
        if(!phone || !pin) return alert("Please enter both Phone and PIN.");
        
        const btn = document.getElementById('btn-login'); btn.innerText = "Verifying..."; btn.disabled = true;
        
        try {
            const res = await fetch(scriptURL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "hub_login", phone: phone, pin: pin })
            });
            const data = await res.json();
            if(data.status === "success") {
                hubName = data.hub_name;
                localStorage.setItem('arabista_hub_name', hubName);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('header-hub-name').innerText = hubName;
                loadDashboard();
            } else { throw new Error(data.message || "Invalid credentials"); }
        } catch (e) { alert(e.message); btn.innerText = "Login securely"; btn.disabled = false; }
    }

    function logout() { localStorage.removeItem('arabista_hub_name'); window.location.reload(); }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.getElementById(`nav-${tabId}`).classList.add('active');
        document.getElementById('scroll-area').scrollTo(0,0);
    }

    async function loadDashboard() {
        document.getElementById('dash-loader').classList.remove('hidden');
        document.getElementById('list-pending').innerHTML = "";
        document.getElementById('list-active').innerHTML = "";
        
        try {
            const res = await fetch(scriptURL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "get_dashboard", hub_name: hubName })
            });
            const data = await res.json();
            document.getElementById('dash-loader').classList.add('hidden');
            
            if(data.status === "success") {
                renderPending(data.orders.pending);
                renderActive(data.orders.inProgress.concat(data.orders.ready));
                populateProfile(data.profile);
            }
        } catch (e) { alert("Failed to sync dashboard."); document.getElementById('dash-loader').classList.add('hidden'); }
    }

    function renderPending(orders) {
        const list = document.getElementById('list-pending');
        if(orders.length === 0) return list.innerHTML = `<p class="text-white/30 text-xs text-center py-4">No pending arrivals.</p>`;
        
        orders.forEach(o => {
            const link = `${trackerBaseUrl}${o.id}`;
            list.innerHTML += `
            <div class="bg-[#1A1B1E] border border-white/5 rounded-xl p-4 shadow-sm">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-white/70 font-mono">${o.id}</span>
                    <span class="text-xs font-bold text-orange-400">Arriving</span>
                </div>
                <p class="font-bold text-base text-white">${o.custName}</p>
                <p class="text-xs text-white/50 mt-1 mb-4 whitespace-pre-line">${o.items.replace(/\[/g, '').replace(/\]/g, '')}</p>
                <button onclick="updateStatus('${o.id}', 'In Progress', '${o.custName}', '${o.custPhone}', '${link}', 1)" class="w-full bg-green-500/10 text-green-400 border border-green-500/20 font-bold py-2.5 rounded-lg text-sm hover:bg-green-500/20 transition flex justify-center items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Mark as Received
                </button>
            </div>`;
        });
    }

    function renderActive(orders) {
        const list = document.getElementById('list-active');
        if(orders.length === 0) return list.innerHTML = `<p class="text-white/30 text-xs text-center py-4">No active alterations.</p>`;
        
        orders.forEach(o => {
            const link = `${trackerBaseUrl}${o.id}`;
            let actionHtml = '';

            if (o.status === "In Progress") {
                actionHtml = `<button onclick="updateStatus('${o.id}', 'Ready for Return', '${o.custName}', '${o.custPhone}', '${link}', 1.5)" class="flex-1 bg-luxe text-brand font-bold py-2.5 rounded-lg text-xs hover:bg-white transition shadow-soft">Mark as Completed</button>`;
            } else if (o.status === "Ready for Return") {
                if (!o.outbound || o.outbound === "") {
                    actionHtml = `<button disabled class="flex-1 bg-white/5 text-white/30 font-bold py-2.5 rounded-lg text-xs border border-white/5 cursor-not-allowed">Waiting for Customer Choice...</button>`;
                } else if (o.outbound === "Self-Pickup") {
                    actionHtml = `<button onclick="updateStatus('${o.id}', 'Dispatched / Picked Up', '', '', '', 0)" class="flex-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 font-bold py-2.5 rounded-lg text-xs hover:bg-blue-500/20 transition">Customer Picked Up</button>`;
                } else if (o.outbound === "Lalamove") {
                    actionHtml = `<button onclick="triggerLalamove('${o.id}', '${o.custName}', '${o.custPhone}')" class="flex-1 bg-orange-500 text-white font-bold py-2.5 rounded-lg text-xs hover:bg-orange-400 transition shadow-[0_0_15px_rgba(249,115,22,0.3)] flex justify-center items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Dispatch Lalamove</button>`;
                }
            }

            list.innerHTML += `
            <div class="bg-[#1A1B1E] border ${o.status === 'Ready for Return' ? 'border-luxe/50' : 'border-white/5'} rounded-xl p-4 shadow-sm">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-white/70 font-mono">${o.id}</span>
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded ${o.status === 'Ready for Return' ? 'bg-luxe text-brand' : 'bg-white/10 text-white/70'}">${o.status}</span>
                </div>
                <div class="flex justify-between items-center mb-3">
                    <p class="font-bold text-base text-white">${o.custName}</p>
                    <a href="tel:${o.custPhone}" class="p-2 bg-white/5 hover:bg-white/10 rounded-full text-white/70 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg></a>
                </div>
                <p class="text-xs text-white/50 mb-4 whitespace-pre-line">${o.items.replace(/\[/g, '').replace(/\]/g, '')}</p>
                <div class="flex gap-2">${actionHtml}</div>
            </div>`;
        });
    }

    async function updateStatus(id, newStatus, custName, phone, link, milestone) {
        if(!confirm(`Update this order to: ${newStatus}?`)) return;
        try {
            await fetch(scriptURL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: "update_order_status", order_id: id, new_status: newStatus }) });
            
            // Trigger WhatsApp Failsafe Milestones
            if (milestone === 1) {
                let msg = `Hi ${custName}! This is Arabista Hub. We have safely received your Abaya for Alteration Order ${id}. We will begin working on it soon. Track progress here: ${link}`;
                sendWA(phone, msg);
            } else if (milestone === 1.5) {
                let msg = `Hi ${custName}! Good news, your Abaya alteration (Order ${id}) is completely finished! 🪡 Please click your tracker link to let us know if you'd like us to Lalamove it to you, or if you will self-pickup: ${link}`;
                sendWA(phone, msg);
            }
            
            loadDashboard();
        } catch (e) { alert("Error updating status."); }
    }

    async function triggerLalamove(id, custName, phone) {
        if(!confirm("Are you sure you want to dispatch a Lalamove rider now? This will deduct from the corporate wallet.")) return;
        // NOTE: Placeholder for Actual Lalamove API connection inside Apps Script!
        // For now, we update the status and trigger the Milestone 2 message.
        try {
            await fetch(scriptURL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: "update_order_status", order_id: id, new_status: "Dispatched / Picked Up" }) });
            let msg = `Hi ${custName}! Your Arabista alteration is complete and on its way back to you! 🪡 You can track the Lalamove rider live via your tracker page: ${trackerBaseUrl}${id}`;
            sendWA(phone, msg);
            loadDashboard();
        } catch(e) { alert("Dispatch error."); }
    }

    function sendWA(phone, msg) {
        let cleanPhone = phone.replace(/[^0-9]/g, '');
        if (cleanPhone.startsWith('0')) cleanPhone = '6' + cleanPhone;
        window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    async function searchOrders() {
        const query = document.getElementById('search-input').value.trim();
        if(!query) return;
        
        document.getElementById('search-loader').classList.remove('hidden');
        document.getElementById('list-search').innerHTML = '';
        
        try {
            const res = await fetch(scriptURL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: "search_order", hub_name: hubName, query: query }) });
            const data = await res.json();
            document.getElementById('search-loader').classList.add('hidden');
            
            if (data.results.length === 0) {
                document.getElementById('list-search').innerHTML = `<p class="text-white/30 text-xs text-center py-4">No results found.</p>`;
            } else {
                data.results.forEach(o => {
                    document.getElementById('list-search').innerHTML += `
                    <div class="bg-white/5 border border-white/10 rounded-xl p-4">
                        <div class="flex justify-between"><span class="text-[10px] font-mono text-white/50">${o.id}</span><span class="text-[10px] text-luxe">${o.status}</span></div>
                        <p class="font-bold text-sm mt-1">${o.custName} <span class="text-white/40 font-normal ml-2">${o.custPhone}</span></p>
                        <p class="text-xs text-white/50 mt-2 truncate">${o.items}</p>
                    </div>`;
                });
            }
        } catch(e) { document.getElementById('search-loader').classList.add('hidden'); alert("Search failed."); }
    }

    function populateProfile(p) {
        document.getElementById('prof-address').value = p.address;
        document.getElementById('prof-phone').value = p.phone;
        document.getElementById('prof-open').value = p.open;
        document.getElementById('prof-close').value = p.close;
        document.getElementById('prof-status').value = p.status;
        hubLat = p.lat; hubLng = p.lng; hubDays = p.days;
        document.getElementById('prof-gps').innerText = `${hubLat}, ${hubLng}`;
    }

    function updateGPS() {
        if(!navigator.geolocation) return alert("Geo not supported");
        document.getElementById('prof-gps').innerText = "Locating satellite...";
        navigator.geolocation.getCurrentPosition(pos => {
            hubLat = pos.coords.latitude.toFixed(6); hubLng = pos.coords.longitude.toFixed(6);
            document.getElementById('prof-gps').innerText = `${hubLat}, ${hubLng}`;
        }, () => alert("GPS failed. Please enable location permissions."), { enableHighAccuracy: true });
    }

    async function saveProfile() {
        const btn = document.getElementById('btn-save-prof'); btn.innerText = "Saving..."; btn.disabled = true;
        const payload = {
            action: "update_profile", hub_name: hubName,
            address: document.getElementById('prof-address').value, phone: document.getElementById('prof-phone').value,
            lat: hubLat, lng: hubLng, days: hubDays, open: document.getElementById('prof-open').value,
            close: document.getElementById('prof-close').value, status: document.getElementById('prof-status').value
        };
        try {
            await fetch(scriptURL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
            btn.innerText = "Saved Successfully!"; setTimeout(() => { btn.innerText = "Save Changes"; btn.disabled = false; }, 2000);
        } catch(e) { alert("Failed to save."); btn.innerText = "Save Changes"; btn.disabled = false; }
    }
  </script>
</body>
</html>
