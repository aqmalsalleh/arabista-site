<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Arabista — Hub Coverage Map</title>
  <meta name="theme-color" content="#0F0F10" />
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        theme: { 
            extend: { 
                fontFamily: { 
                    display: ['"Cormorant Garamond"', 'serif'], 
                    sans: ['Inter', 'ui-sans-serif', 'system-ui'], 
                }, 
                colors: { 
                    brand: { DEFAULT: '#0F0F10', light: '#1A1A1C' }, 
                    luxe: { DEFAULT: '#C0A062', hover: '#D4B87A' } 
                } 
            } 
        } 
    }
  </script>
</head>

<body class="bg-brand text-white font-sans h-screen flex flex-col overflow-hidden relative">

  <header class="bg-brand/90 backdrop-blur-md border-b border-white/10 p-4 flex justify-between items-center z-20 relative shadow-md shrink-0">
    <div>
        <h1 class="font-display text-2xl font-semibold tracking-wide text-white leading-tight">ARABISTA</h1>
        <p id="god-mode-trigger" class="text-xs text-luxe tracking-widest uppercase cursor-default select-none">Coverage Map</p>
    </div>
    <div id="status-indicator" class="text-xs font-medium text-white/50 flex items-center">
        <svg class="animate-spin h-4 w-4 mr-2 text-luxe" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Syncing Hubs...
    </div>
  </header>

  <div class="absolute top-24 left-4 right-20 md:right-auto md:w-80 z-10 pointer-events-none">
      <button id="btn-locate" onclick="locateUser()" class="pointer-events-auto w-full bg-brand-light/95 backdrop-blur-md border border-white/10 hover:border-luxe/50 text-white shadow-lg rounded-lg p-3 flex items-center justify-center transition-all">
          <svg class="w-5 h-5 text-luxe mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span class="text-sm font-medium">Find Hubs Near Me</span>
      </button>
  </div>

  <div class="absolute top-24 right-4 z-10 flex flex-col items-end space-y-3 pointer-events-none">
      <div class="pointer-events-auto flex flex-col items-end relative">
          <button onclick="toggleRadius()" class="w-12 h-12 bg-brand-light/95 backdrop-blur-md border border-white/10 hover:border-luxe/50 text-luxe shadow-lg rounded-full flex items-center justify-center transition-all">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          </button>
          
          <div id="radius-content" class="hidden absolute top-14 right-0 w-48 bg-brand-light/95 backdrop-blur-md border border-white/10 shadow-2xl rounded-xl p-4 transition-all origin-top-right">
              <div class="flex justify-between text-[10px] text-white/70 font-medium mb-3 uppercase tracking-wider">
                  <span>Radius Range</span>
                  <span id="radius-display" class="text-luxe font-bold">1 KM</span>
              </div>
              <input type="range" id="radius-slider" min="1" max="15" value="1" class="w-full h-1 bg-white/20 rounded-lg appearance-none cursor-pointer accent-luxe" oninput="updateRadius(this.value)">
          </div>
      </div>
  </div>

  <div id="map" class="flex-grow w-full h-full"></div>

  <div id="hub-modal" class="fixed inset-x-4 bottom-32 md:inset-auto md:bottom-10 md:right-10 md:w-80 bg-brand-light border border-luxe shadow-2xl rounded-xl z-30 hidden flex-col transition-all">
      <div class="flex justify-between items-center border-b border-white/10 p-4 bg-brand/50 rounded-t-xl">
          <h3 id="modal-title" class="font-display font-bold text-xl text-luxe">Hub Name</h3>
          <button onclick="closeModal()" class="text-white/40 hover:text-white text-2xl leading-none">×</button>
      </div>
      <div class="p-4 space-y-3">
          <div id="modal-status"></div>
          <p class="text-sm text-white/80">⏰ Operates: <span id="modal-hours"></span></p>
          
          <div id="modal-god-mode" class="hidden mt-3 pt-3 border-t border-white/10">
              <p class="text-xs text-red-400 font-bold mb-1 tracking-wider uppercase">🛡️ HQ Data</p>
              <p id="modal-phone" class="text-sm text-white/90 font-mono"></p>
              <p id="modal-address" class="text-xs text-white/60 mt-2 leading-relaxed"></p>
          </div>

          <a id="modal-nav-btn" href="#" target="_blank" class="flex items-center justify-center w-full py-2.5 mt-4 rounded-lg border border-luxe text-luxe hover:bg-luxe hover:text-brand transition-colors font-medium">
              📍 Navigate to Hub
          </a>
      </div>
  </div>

  <div id="confirm-location-modal" class="fixed inset-x-4 bottom-12 md:bottom-10 md:left-1/2 md:-translate-x-1/2 md:w-80 bg-brand-light border border-luxe shadow-2xl rounded-xl z-50 hidden flex-col transition-all">
      <div class="p-5 text-center">
          <p class="text-luxe font-extrabold text-sm tracking-wider uppercase mb-1">📍 Is this you?</p>
          <p class="text-white/80 text-sm mb-5 font-medium">Drag the blue pin to your EXACT location.</p>
          <button onclick="confirmLocation()" class="w-full bg-luxe hover:bg-luxe-hover text-brand font-bold py-3 rounded-lg transition-colors shadow-[0_0_15px_rgba(192,160,98,0.2)]">
              Confirm Location
          </button>
      </div>
  </div>

  <button id="cta-fab" onclick="showCTA()" class="fixed bottom-12 left-4 z-40 w-14 h-14 bg-luxe hover:bg-luxe-hover text-brand shadow-[0_0_20px_rgba(192,160,98,0.5)] rounded-full flex items-center justify-center transition-all duration-300 transform scale-100 opacity-100 cursor-pointer">
      <svg class="w-7 h-7 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
      <span id="cta-badge" class="absolute -top-2 -right-8 bg-white border border-luxe/50 text-brand text-[10px] font-bold px-2.5 py-1 rounded-full animate-pulse shadow-[0_0_10px_rgba(255,255,255,0.5)] whitespace-nowrap pointer-events-none">
          Join Network
      </span>
  </button>

  <div id="cta-box" class="fixed bottom-12 left-0 right-0 px-4 z-50 flex justify-center transition-all duration-500 transform translate-y-32 opacity-0 pointer-events-none">
      <div id="cta-inner-box" class="relative bg-brand-light/95 backdrop-blur-md border border-luxe/30 shadow-[0_10px_40px_rgba(0,0,0,0.8)] rounded-xl p-5 max-w-sm w-full text-center pointer-events-none">
          <button onclick="hideCTA()" class="absolute top-2 right-3 text-white/40 hover:text-white p-2 text-2xl font-bold leading-none">×</button>
          <p class="text-sm text-white/90 mb-4 mt-2 pr-4 pl-4 leading-relaxed font-medium">No hubs in your area? Claim this zone and dominate the local market.</p>
          <a href="hub-lite.html" class="block w-full bg-luxe hover:bg-luxe-hover text-brand font-semibold py-3.5 rounded-lg transition-colors shadow-[0_0_15px_rgba(192,160,98,0.2)]">
              Become a Hub Partner
          </a>
      </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyrJFfuCrhAbdwzAj8uP4sSvFuzRzzzEFV5CHOCBSOK6OGlIXPtsf7-XEfjLHGnFZiyvw/exec';
    
    let map;
    let hubs = [];
    let markers = [];
    let circles = [];
    let godMode = false;
    let currentRadius = 1000;
    let userLocationMarker = null;

    // --- DARK THEME MAP STYLE (Muted Cities, Hidden POIs) ---
    const arabistaMapStyle = [
        { featureType: "poi", elementType: "all", stylers: [{ visibility: "off" }] },
        { featureType: "transit", elementType: "all", stylers: [{ visibility: "off" }] },
        { featureType: "road", elementType: "labels.icon", stylers: [{ visibility: "off" }] }, 
        { elementType: "geometry", stylers: [{ color: "#1A1A1C" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#1A1A1C" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
        { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d1d5db" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#2c2c2f" }] },
        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
        { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
        { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#3c3c40" }] },
        { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1f2835" }] },
        { featureType: "road.highway", elementType: "labels.text.fill", stylers: [{ color: "#8b939e" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#0F0F10" }] },
        { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
        { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
    ];

    async function initMap() {
        const klCenter = { lat: 3.1390, lng: 101.6869 };
        
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 11,
            center: klCenter,
            styles: arabistaMapStyle,
            disableDefaultUI: true,
            zoomControl: true,
            clickableIcons: false 
        });

        map.addListener("click", closeModal);
        await fetchHubData();
    }

    async function fetchHubData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            if(data.hubs) {
                hubs = data.hubs;
                document.getElementById('status-indicator').innerHTML = `<span class="text-green-500">● Live Network</span>`;
                plotHubs();
            }
        } catch (error) {
            console.error(error);
            document.getElementById('status-indicator').innerHTML = `<span class="text-red-500">Connection Failed</span>`;
        }
    }

    function plotHubs() {
        markers.forEach(m => m.setMap(null));
        circles.forEach(c => c.setMap(null));
        markers = []; circles = [];

        hubs.forEach(hub => {
            const position = { lat: parseFloat(hub.lat), lng: parseFloat(hub.lng) };
            
            const marker = new google.maps.Marker({
                position: position,
                map: map,
                icon: {
                    path: "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z",
                    fillColor: "#C0A062",
                    fillOpacity: 1,
                    strokeWeight: 1.5,
                    strokeColor: "#0F0F10",
                    scale: 1.5,
                    anchor: new google.maps.Point(12, 22)
                },
                title: hub.name
            });

            const circle = new google.maps.Circle({
                strokeColor: "#C0A062",
                strokeOpacity: 0.8,
                strokeWeight: 1,
                fillColor: "#C0A062",
                fillOpacity: 0.1,
                map: map,
                center: position,
                radius: currentRadius
            });

            marker.addListener("click", () => {
                openModal(hub);
            });

            markers.push(marker);
            circles.push(circle);
        });
    }

    // --- UI CONTROLS ---

    function toggleRadius() {
        const content = document.getElementById('radius-content');
        content.classList.toggle('hidden');
    }

    function updateRadius(val) {
        document.getElementById('radius-display').innerText = val + " KM";
        currentRadius = parseInt(val) * 1000;
        circles.forEach(c => c.setRadius(currentRadius));
    }

    // --- CTA ANIMATIONS & FIXES ---
    function showCTA() {
        const box = document.getElementById('cta-box');
        const innerBox = document.getElementById('cta-inner-box');
        const fab = document.getElementById('cta-fab');
        const badge = document.getElementById('cta-badge');
        
        // Hide FAB
        fab.classList.replace('scale-100', 'scale-0');
        fab.classList.replace('opacity-100', 'opacity-0');
        fab.classList.add('pointer-events-none');
        badge.style.display = 'none'; 
        
        // Show Box and restore pointer events to inner box so it's clickable
        box.classList.replace('translate-y-32', 'translate-y-0');
        box.classList.replace('opacity-0', 'opacity-100');
        box.classList.remove('pointer-events-none');
        innerBox.classList.remove('pointer-events-none');
        innerBox.classList.add('pointer-events-auto');
    }

    function hideCTA() {
        const box = document.getElementById('cta-box');
        const innerBox = document.getElementById('cta-inner-box');
        const fab = document.getElementById('cta-fab');
        
        // Hide Box and COMPLETELY STRIP pointer events from inner box so it never blocks clicks
        box.classList.replace('translate-y-0', 'translate-y-32');
        box.classList.replace('opacity-100', 'opacity-0');
        box.classList.add('pointer-events-none');
        innerBox.classList.remove('pointer-events-auto');
        innerBox.classList.add('pointer-events-none');
        
        // Show FAB
        fab.classList.replace('scale-0', 'scale-100');
        fab.classList.replace('opacity-0', 'opacity-100');
        fab.classList.remove('pointer-events-none');
    }

    function openModal(hub) {
        document.getElementById('modal-title').innerText = hub.name;
        document.getElementById('modal-hours').innerText = `${hub.open} - ${hub.close}`;
        
        let statusBadge = hub.backlog >= hub.max_capacity 
            ? `<span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded border border-red-500/30 font-semibold tracking-wide">BUSY / FULL</span>`
            : `<span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30 font-semibold tracking-wide">OPEN FOR ORDERS</span>`;
        document.getElementById('modal-status').innerHTML = statusBadge;

        const navLink = `https://www.google.com/maps/dir/?api=1&destination=...{parseFloat(hub.lat)},${parseFloat(hub.lng)}`;
        document.getElementById('modal-nav-btn').href = navLink;

        const godModeBox = document.getElementById('modal-god-mode');
        if(godMode) {
            godModeBox.classList.remove('hidden');
            document.getElementById('modal-phone').innerText = `📞 ${hub.phone}`;
            document.getElementById('modal-address').innerText = hub.address;
        } else {
            godModeBox.classList.add('hidden');
        }

        document.getElementById('hub-modal').classList.remove('hidden');
        document.getElementById('hub-modal').classList.add('flex');
        hideCTA();
        
        map.panTo({ lat: parseFloat(hub.lat), lng: parseFloat(hub.lng) });
    }

    function closeModal() {
        document.getElementById('hub-modal').classList.add('hidden');
        document.getElementById('hub-modal').classList.remove('flex');
    }

    function locateUser() {
        const btn = document.getElementById('btn-locate');
        const origHTML = btn.innerHTML;
        
        // Start Pulsating State
        btn.innerHTML = `<svg class="animate-spin w-5 h-5 text-luxe mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="text-sm font-medium">Locating...</span>`;
        btn.disabled = true;
        btn.classList.add('animate-pulse');

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // Revert Button State
                    btn.innerHTML = origHTML;
                    btn.disabled = false;
                    btn.classList.remove('animate-pulse');

                    const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                    
                    // Street-level Zoom
                    map.setZoom(16);
                    map.setCenter(pos);
                    
                    if(userLocationMarker) userLocationMarker.setMap(null);

                    // --- THE SOLID BLUE TEARDROP PIN FIX ---
                    // By using an inline SVG string, we guarantee a solid pin shape with no center hole
                    // and a perfectly matched physical bounding box for effortless mobile clicking.
                    const svgBluePin = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="32" height="48"><path fill="#4285F4" stroke="#ffffff" stroke-width="2" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>');

                    userLocationMarker = new google.maps.Marker({
                        position: pos,
                        map: map,
                        draggable: true,
                        icon: {
                            url: svgBluePin,
                            scaledSize: new google.maps.Size(32, 48),
                            anchor: new google.maps.Point(16, 48)
                        },
                        title: "Your Location",
                        zIndex: 9999
                    });

                    // THE RE-CLICK LOGIC
                    userLocationMarker.addListener('click', () => {
                        map.setZoom(16);
                        map.panTo(userLocationMarker.getPosition());
                        document.getElementById('confirm-location-modal').classList.remove('hidden');
                        document.getElementById('confirm-location-modal').classList.add('flex');
                        closeModal(); // Hide hub modal if open
                        hideCTA();    // Hide CTA box if open
                    });

                    // Show Custom Confirm Location Modal
                    document.getElementById('confirm-location-modal').classList.remove('hidden');
                    document.getElementById('confirm-location-modal').classList.add('flex');

                    // RE-OPEN BOX AFTER DRAG
                    userLocationMarker.addListener('dragend', () => {
                        map.panTo(userLocationMarker.getPosition());
                        document.getElementById('confirm-location-modal').classList.remove('hidden');
                        document.getElementById('confirm-location-modal').classList.add('flex');
                    });

                },
                () => { 
                    btn.innerHTML = origHTML;
                    btn.disabled = false;
                    btn.classList.remove('animate-pulse');
                    alert("Location access denied or unavailable."); 
                },
                { enableHighAccuracy: true } // Forces GPS chip for precision
            );
        } else { 
            btn.innerHTML = origHTML;
            btn.disabled = false;
            btn.classList.remove('animate-pulse');
            alert("Your browser doesn't support geolocation."); 
        }
    }

    // --- ZOOM OUT AND CLOSE CONFIRMATION MODAL ---
    function confirmLocation() {
        document.getElementById('confirm-location-modal').classList.add('hidden');
        document.getElementById('confirm-location-modal').classList.remove('flex');
        
        map.setZoom(13); // Zoom out perfectly to see network
        
        if(userLocationMarker) {
            map.panTo(userLocationMarker.getPosition());
        }
    }

    // --- HQ GOD MODE LISTENER ---
    document.getElementById('god-mode-trigger').addEventListener('dblclick', () => {
        if(godMode) {
            godMode = false;
            alert("God Mode Deactivated.");
            closeModal();
            return;
        }
        const pin = prompt("Enter HQ Master PIN:");
        if(pin === "7777") {
            godMode = true;
            alert("🛡️ God Mode Activated. Full addresses and phone numbers unlocked.");
            closeModal(); 
        } else if (pin !== null) {
            alert("Access Denied.");
        }
    });

  </script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBobNKxxSv_0cTX-EH5cuhF-HKiOHHmuB8&callback=initMap"></script>
</body>
</html>
