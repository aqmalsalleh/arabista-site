<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Arabista — Hub Coverage Map</title>
  <meta name="theme-color" content="#0F0F10" />
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
        theme: { 
            extend: { 
                fontFamily: { 
                    display: ['"Cormorant Garamond"', 'serif'], 
                    sans: ['Inter', 'ui-sans-serif', 'system-ui'], 
                }, 
                colors: { 
                    brand: { DEFAULT: '#0F0F10', light: '#1A1A1C' }, 
                    luxe: { DEFAULT: '#C0A062', hover: '#D4B87A' } 
                } 
            } 
        } 
    }
  </script>
  <style>
    /* Custom Map Info Window Styling */
    .gm-style .gm-style-iw-c {
        background-color: #1A1A1C !important;
        border: 1px solid #C0A062 !important;
        border-radius: 8px !important;
        padding: 12px !important;
        color: white !important;
    }
    .gm-style .gm-style-iw-tc::after { background: #1A1A1C !important; }
    .gm-style-iw-d { overflow: hidden !important; }
    .gm-ui-hover-effect { filter: invert(1); } /* Makes the close X white */
  </style>
</head>

<body class="bg-brand text-white font-sans h-screen flex flex-col overflow-hidden relative">

  <header class="bg-brand/90 backdrop-blur-md border-b border-white/10 p-4 flex justify-between items-center z-10 relative shadow-md">
    <div>
        <h1 class="font-display text-2xl font-semibold tracking-wide text-white leading-tight">ARABISTA</h1>
        <p id="god-mode-trigger" class="text-xs text-luxe tracking-widest uppercase cursor-default select-none">Coverage Map</p>
    </div>
    <div id="status-indicator" class="text-xs font-medium text-white/50 flex items-center">
        <svg class="animate-spin h-4 w-4 mr-2 text-luxe" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Syncing Hubs...
    </div>
  </header>

  <div class="absolute top-24 left-4 z-10 w-[calc(100%-2rem)] md:w-80 space-y-3">
      <button onclick="locateUser()" class="w-full bg-brand-light border border-white/10 hover:border-luxe/50 text-white shadow-lg rounded-lg p-3 flex items-center justify-center transition-all">
          <svg class="w-5 h-5 text-luxe mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          Find Hubs Near Me
      </button>

      <div class="bg-brand-light border border-white/10 shadow-lg rounded-lg p-4">
          <div class="flex justify-between text-xs text-white/70 font-medium mb-3 uppercase tracking-wider">
              <span>Coverage Radius</span>
              <span id="radius-display" class="text-luxe font-bold">5 KM</span>
          </div>
          <input type="range" id="radius-slider" min="1" max="15" value="5" class="w-full h-1 bg-white/20 rounded-lg appearance-none cursor-pointer accent-luxe" oninput="updateRadius(this.value)">
      </div>
  </div>

  <div id="map" class="flex-grow w-full h-full"></div>

  <div class="absolute bottom-6 left-0 right-0 px-4 z-10 flex justify-center pointer-events-none">
      <div class="bg-brand-light/95 backdrop-blur-md border border-luxe/30 shadow-2xl rounded-xl p-4 max-w-sm w-full text-center pointer-events-auto">
          <p class="text-sm text-white/90 mb-3">No hubs in your area? Claim this zone and dominate the local market.</p>
          <a href="hub-lite.html" class="block w-full bg-luxe hover:bg-luxe-hover text-brand font-semibold py-3 rounded-lg transition-colors shadow-[0_0_15px_rgba(192,160,98,0.3)]">
              Become a Hub Partner
          </a>
      </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyrJFfuCrhAbdwzAj8uP4sSvFuzRzzzEFV5CHOCBSOK6OGlIXPtsf7-XEfjLHGnFZiyvw/exec';
    
    let map;
    let hubs = [];
    let markers = [];
    let circles = [];
    let godMode = false;
    let currentRadius = 5000; // Default 5km
    let infoWindow;

    // --- DARK THEME MAP STYLE ---
    const arabistaMapStyle = [
        { elementType: "geometry", stylers: [{ color: "#1A1A1C" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#1A1A1C" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
        { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#C0A062" }] },
        { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
        { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#263c3f" }] },
        { featureType: "poi.park", elementType: "labels.text.fill", stylers: [{ color: "#6b9a76" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#2c2c2f" }] },
        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
        { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
        { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#3c3c40" }] },
        { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1f2835" }] },
        { featureType: "road.highway", elementType: "labels.text.fill", stylers: [{ color: "#f3d19c" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#0F0F10" }] },
        { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
        { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
    ];

    async function initMap() {
        // Default Center: Kuala Lumpur
        const klCenter = { lat: 3.1390, lng: 101.6869 };
        
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 11,
            center: klCenter,
            styles: arabistaMapStyle,
            disableDefaultUI: true,
            zoomControl: true,
        });

        infoWindow = new google.maps.InfoWindow();
        await fetchHubData();
    }

    async function fetchHubData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            if(data.hubs) {
                hubs = data.hubs;
                document.getElementById('status-indicator').innerHTML = `<span class="text-wa">● Live Network</span>`;
                plotHubs();
            }
        } catch (error) {
            console.error(error);
            document.getElementById('status-indicator').innerHTML = `<span class="text-red-500">Connection Failed</span>`;
        }
    }

    function plotHubs() {
        // Clear existing
        markers.forEach(m => m.setMap(null));
        circles.forEach(c => c.setMap(null));
        markers = []; circles = [];

        hubs.forEach(hub => {
            const position = { lat: hub.lat, lng: hub.lng };
            
            // 1. Draw The Gold Marker
            const marker = new google.maps.Marker({
                position: position,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: "#C0A062",
                    fillOpacity: 1,
                    strokeWeight: 2,
                    strokeColor: "#0F0F10"
                },
                title: hub.name
            });

            // 2. Draw the Coverage Radius
            const circle = new google.maps.Circle({
                strokeColor: "#C0A062",
                strokeOpacity: 0.8,
                strokeWeight: 1,
                fillColor: "#C0A062",
                fillOpacity: 0.1,
                map: map,
                center: position,
                radius: currentRadius
            });

            // 3. Info Card Click Event
            marker.addListener("click", () => {
                let statusBadge = hub.backlog >= hub.max_capacity 
                    ? `<span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded border border-red-500/30">BUSY / FULL</span>`
                    : `<span class="text-xs bg-wa/20 text-wa px-2 py-1 rounded border border-wa/30">OPEN FOR ORDERS</span>`;

                let content = `
                    <div class="p-1 min-w-[200px] font-sans">
                        <h3 class="font-display font-bold text-lg text-luxe mb-1">${hub.name}</h3>
                        <div class="mb-3">${statusBadge}</div>
                        <p class="text-sm text-white/80 mb-1">⏰ Operates: ${hub.open} - ${hub.close}</p>
                `;

                // Privacy check vs God Mode
                if(godMode) {
                    content += `
                        <div class="mt-3 pt-3 border-t border-white/10">
                            <p class="text-xs text-red-400 font-bold mb-1">🛡️ GOD MODE DATA</p>
                            <p class="text-sm text-white/90">📞 ${hub.phone}</p>
                            <p class="text-xs text-white/70 mt-1">${hub.address}</p>
                        </div>
                    `;
                } else {
                    // Masked address for public
                    let maskedAddress = hub.address.split(',').slice(-2).join(', ').trim(); // Usually gets State/City
                    content += `<p class="text-xs text-white/50 mt-2">📍 Area: ${maskedAddress}</p>`;
                }

                content += `</div>`;
                infoWindow.setContent(content);
                infoWindow.open(map, marker);
            });

            markers.push(marker);
            circles.push(circle);
        });
    }

    function updateRadius(val) {
        document.getElementById('radius-display').innerText = val + " KM";
        currentRadius = parseInt(val) * 1000;
        circles.forEach(c => c.setRadius(currentRadius));
    }

    function locateUser() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                    map.setCenter(pos);
                    map.setZoom(13);
                    
                    // Drop a blue dot for the user
                    new google.maps.Marker({
                        position: pos,
                        map: map,
                        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: "#4285F4", fillOpacity: 1, strokeWeight: 2, strokeColor: "#ffffff" },
                        title: "You are here"
                    });
                },
                () => { alert("Location access denied or unavailable."); }
            );
        } else { alert("Your browser doesn't support geolocation."); }
    }

    // --- HQ GOD MODE LISTENER ---
    document.getElementById('god-mode-trigger').addEventListener('dblclick', () => {
        if(godMode) {
            godMode = false;
            alert("God Mode Deactivated.");
            infoWindow.close();
            return;
        }
        const pin = prompt("Enter HQ Master PIN:");
        if(pin === "7777") {
            godMode = true;
            alert("🛡️ God Mode Activated. Full addresses and phone numbers unlocked.");
            infoWindow.close(); // Force user to click pins again to see fresh data
        } else if (pin !== null) {
            alert("Access Denied.");
        }
    });

  </script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBobNKxxSv_0cTX-EH5cuhF-HKiOHHmuB8&callback=initMap"></script>
</body>
</html>
