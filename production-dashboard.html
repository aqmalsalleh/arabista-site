<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Production Engine — Arabista</title>
  <meta name="theme-color" content="#0F0F10" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 
            display: ['"Cormorant Garamond"', 'serif'], 
            sans: ['Inter', 'ui-sans-serif', 'system-ui'] 
          },
          colors: { brand: '#0F0F10', luxe: '#C0A062', ink: '#111213' },
          boxShadow: { soft: '0 10px 30px rgba(0,0,0,.08)' }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0F0F10; color: #ffffff; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass-panel { background-color: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
  <script>
    // INJECT YOUR DEPLOYED GOOGLE APPS SCRIPT URL HERE
    window.ARABISTA_ADMIN_CONTEXT = { 
      apiUrl: 'https://docs.google.com/spreadsheets/d/1kvwZjBjHntKH_d1Ksl9j5L0WOzUag0uU8V8xUtdQaMU/exec' 
    };
  </script>
</head>
<body class="font-sans antialiased selection:bg-luxe selection:text-ink max-w-[100vw] overflow-x-hidden relative h-screen flex flex-col">

  <!-- AUTH OVERLAY -->
  <div id="admin-login-overlay" class="fixed inset-0 z-50 bg-brand flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="glass-panel p-10 rounded-2xl w-full max-w-sm text-center shadow-soft">
      <h1 class="font-display tracking-[0.18em] text-2xl text-white mb-2 uppercase">Arabista</h1>
      <p class="text-white/50 text-xs uppercase tracking-widest mb-8">Production Engine</p>
      
      <input type="password" id="pin-input" maxlength="6" class="w-full bg-ink border border-white/20 rounded-lg text-center text-white px-4 py-3 text-2xl tracking-[0.5em] focus:border-luxe outline-none transition-colors mb-4 placeholder:text-white/20" placeholder="••••••">
      
      <button id="btn-login" class="w-full bg-luxe text-ink font-medium uppercase tracking-widest py-3.5 rounded-xl hover:opacity-90 transition shadow-soft">Authenticate</button>
      <p id="login-error" class="text-red-400 text-xs mt-4 hidden">Invalid PIN or Network Error</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-container" class="hidden flex-col h-full opacity-0 transition-opacity duration-700">
    <!-- Header -->
    <header class="h-16 border-b border-white/10 flex items-center justify-between px-6 shrink-0 bg-ink">
      <div class="font-display tracking-[0.18em] text-lg text-white uppercase">Arabista <span class="text-luxe font-sans text-[10px] tracking-widest ml-2">Production</span></div>
      <button id="btn-logout" class="text-white/50 hover:text-white text-xs uppercase tracking-widest transition-colors">Lock Session</button>
    </header>

    <!-- Top Sticky Metrics Bar -->
    <div class="glass-panel sticky top-0 z-40 border-b-0 border-x-0">
      <div class="max-w-screen-2xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
          <p class="text-white/40 text-[10px] uppercase tracking-widest mb-1">Total Expected Revenue</p>
          <div class="font-display text-2xl text-white" id="metric-revenue">RM 0.00</div>
        </div>
        <div class="hidden sm:block w-px h-8 bg-white/10"></div>
        <div>
          <p class="text-white/40 text-[10px] uppercase tracking-widest mb-1">Total Procurement Cost</p>
          <div class="font-display text-2xl text-white" id="metric-cogs">RM 0.00</div>
        </div>
        <div class="hidden sm:block w-px h-8 bg-white/10"></div>
        <div class="text-right">
          <p class="text-luxe text-[10px] uppercase tracking-widest mb-1 font-medium">Net Profit Forecast</p>
          <div class="font-display text-3xl text-luxe" id="metric-profit">RM 0.00</div>
        </div>
      </div>
    </div>

    <!-- Main Workspace -->
    <main class="flex-1 overflow-hidden flex flex-col lg:flex-row">
      
      <!-- Left Panel: Monthly Plans -->
      <section class="w-full lg:w-1/2 h-full overflow-y-auto hide-scrollbar border-r border-white/10 p-6 bg-brand">
        <div class="flex justify-between items-end mb-6">
          <h2 class="font-display text-2xl text-white">Monthly Plan Inputs</h2>
          <span class="text-white/40 text-xs uppercase tracking-widest" id="plan-month-label">YYYY-MM</span>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="plans-grid">
          <!-- Populated by JS -->
          <div class="text-white/30 text-sm animate-pulse">Loading models...</div>
        </div>
      </section>

      <!-- Right Panel: Procurement List -->
      <section class="w-full lg:w-1/2 h-full overflow-y-auto hide-scrollbar p-6 bg-ink">
        <h2 class="font-display text-2xl text-white mb-6">Procurement Ledger</h2>
        <div id="procurement-list" class="space-y-6">
          <!-- Populated by JS -->
          <div class="text-white/30 text-sm animate-pulse">Awaiting input...</div>
        </div>
      </section>

    </main>
  </div>

  <script src="production-app.js"></script>
</body>
</html>
